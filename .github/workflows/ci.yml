name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # Quick gate: every .py file in the repo must at least parse. Catches
  # syntax errors and import-time accidents without paying the cost of a
  # full dependency install. ~10s.
  syntax-check:
    name: syntax-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: ast.parse every .py file
        run: |
          python - <<'PY'
          import ast, pathlib, sys
          failed = []
          for p in pathlib.Path('.').rglob('*.py'):
              if any(seg.startswith(('.', '_external', 'venv')) for seg in p.parts):
                  continue
              try:
                  ast.parse(p.read_text())
              except SyntaxError as exc:
                  failed.append(f"{p}: {exc}")
          if failed:
              print("\n".join(failed))
              sys.exit(1)
          print("syntax OK across", sum(1 for _ in pathlib.Path('.').rglob('*.py')), "files")
          PY

  # Full smoke test: install runtime deps and verify the public benchmark
  # surface still imports and EarlyStopTracker behaviour is preserved.
  smoke-tests:
    name: smoke-tests (python-${{ matrix.python }})
    runs-on: ubuntu-latest
    needs: syntax-check
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
      - name: pytest tests/
        run: pytest tests/ -x --tb=short
